name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Atualizar toolchain Python
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Instalar projeto e dependências de desenvolvimento
        run: python -m pip install -e ".[dev]"

      - name: Compilar fontes Python
        run: python -m compileall -q src .opencode/tools/medical_twin_runner.py

      - name: Ruff
        run: python -m ruff check src tests .opencode/tools/medical_twin_runner.py

      - name: Mypy
        run: python -m mypy src

      - name: Testes e cobertura
        run: >-
          python -m pytest
          --cov=opencode_medical_digital_twin_mirofish_reversa
          --cov-report=term-missing

      - name: Smoke test do bridge OpenCode
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from opencode_medical_digital_twin_mirofish_reversa.opencode_bridge import execute_opencode_request

          root = Path.cwd()
          result = execute_opencode_request(
              {
                  "operation": "simulate",
                  "case_file": "examples/synthetic_case.json",
                  "adapter": "deterministic",
                  "horizon": 4,
                  "seed": 42,
                  "output_file": ".opencode/artifacts/medical-twin/ci-smoke.json",
              },
              worktree=root,
          )
          assert result["ok"] is True
          assert result["trajectory_count"] == 4
          assert result["safety"]["clinical_use_allowed"] is False
          assert (root / result["artifact_path"]).is_file()
          PY

      - name: Construir wheel e sdist
        run: python -m build
